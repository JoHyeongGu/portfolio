name: portfolio
description: "Space For Saving portfolios"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  firebase_core: ^3.5.0
  cloud_firestore: ^5.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: leeseoyoon
      fonts:
        - asset: assets/fonts/leeseoyoon_font.ttf
    - family: magicpen
      fonts:
        - asset: assets/fonts/Cafe24Supermagic-Regular-v1.0.ttf
          weight: 400
        - asset: assets/fonts/Cafe24Supermagic-Bold-v1.0.ttf
          weight: 700
    - family: pixel
      fonts:
        - asset: assets/fonts/DungGeunMo.ttf
    - family: dangdang
      fonts:
        - asset: assets/fonts/Cafe24Dangdanghae-v2.0.ttf
